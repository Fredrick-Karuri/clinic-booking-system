services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clinic
    ports:
      - "5432:5432"
    volumes:
      - clinic_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/clinic
      ENVIRONMENT: development
      AUTH_TOKEN_SEED: dev-only-insecure-seed-change-in-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  clinic_pgdata: